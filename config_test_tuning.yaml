# Test config untuk verify tuning flow
# Copy dari config.yaml tapi dengan instance kecil dan optuna enabled

# Multi-Device Configuration
device:
  device_id: null
  total_devices: 1

# Dataset Configuration
dataset:
  base_path: "data/solomon"
  instances:
    - "C101"  # Test dengan 1 instance kecil
  types:
    - "C"

# GA Parameters
ga:
  population_size: 100
  max_generations: 500
  crossover_rate: 0.8
  mutation_rate: 0.1
  elitism_rate: 0.1
  tournament_size: 3

# Representations
representations:
  - "permutation"

# Selection methods
selection_methods:
  - "roulette_wheel"
  - "tournament"

# Crossover methods
crossover_methods:
  permutation:
    - "pmx"
    - "ox"

# Mutation methods
mutation_methods:
  permutation:
    - "swap"
    - "insert"

# Optuna Tuning Configuration - ENABLED untuk test
optuna:
  enabled: true  # Enable untuk test
  n_trials: 5    # Kecilkan untuk test cepat
  timeout: 300   # 5 menit
  save_history: true

# Evaluation Configuration
evaluation:
  n_runs: 3      # Kecilkan untuk test cepat
  save_results: true
  save_plots: true
  save_routes: true
  save_convergence_history: true
  parallel: true
  n_jobs: 4      # Kecilkan untuk test
  parallel_methods: false

# Output Configuration
output:
  results_dir: "results"
  experiments_dir: "results/experiments"
  plots_dir: "results/plots"
  routes_dir: "results/routes"
  convergence_dir: "results/convergence"
  tuning_dir: "results/tuning"
  checkpoint_file: "results/checkpoint.json"
  verbose: true

